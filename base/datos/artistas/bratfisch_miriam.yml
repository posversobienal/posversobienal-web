detalle: |
  (Sorocaba, 1956). Vive y trabaja en São Paulo. Se graduó en Fonoaudiología por la PUC Campinas y tiene un posgrado en Prácticas Artísticas Contemporáneas por la Fundación Armando Álvares Penteado. Su investigación artística surge del impulso de recuperar la memoria y escuchar las narrativas que el tiempo intenta borrar, apropiándose de objetos desechados, imágenes olvidadas y tecnologías obsoletas, incorporando sus huellas y silencios a la trama de sus obras. Las instalaciones, pinturas, collages y objetos que crea invitan a la desaceleración y la contemplación, evocando historias personales y colectivas que se resisten a la desaparición. Ha realizado exposiciones individuales como Repensar O Fato Como Se Estivesse Nele, Espaço de Fotografia UFF de Niterói (RJ, 2017), Rew<<>>Fwd, Projeto Qualcasa Hermes Artes Visuais, SP, (2016) y colectivas como Memórias, Sítios e Desterros, (Galeria Gare, São Paulo, 2025), Casa da Cidadania e da Língua (Coimbra, PT, 2025), Nenhumlugaragora, (Ed Vera, SP, 2023). Participó de la Residencia Editorial RAMA, 2024, y de la Residencia ACHO, (2022/23). Recibió un Premio Beca en la 48ª Exposición Anual FAAP (2016), un Premio Adquisición en el 23º Salón de Arte de Praia Grande (2016) y un Premio a la Exposición Colectiva en el 15º Salón de Arte Contemporáneo de Guarulhos (2016). Sus obras se encuentran en colecciones públicas como el Espaço Henfil de Cultura (São Bernardo do Campo, SP), Municipio de Praia Grande (São Paulo) y Universidad Federal Fluminense, UFF (RJ).
