detalle: |
  (Rosario, 1963)  Artista visual, docente y curadora. Vive y trabaja en Junín. Es Profesora Nacional de Pintura y Profesora Superior con Especialización en Dibujo. Su producción posee una fuerte impronta dibujística, pero configurando un lenguaje expandido hacia el textil, la performance, las instalaciones y el libro de artista. Desarrolla una práctica artística territorialmente situada que aborda problemáticas ambientales, de género y de memoria, tanto personal como colectiva. Ha desplegado también una vasta tarea docente en diferentes funciones y niveles educativos, tanto en el ámbito académico como en el informal. Ha participado en numerosos proyectos colectivos con artistxs de su región reforzando redes entre comunidades. Es integrante del Colectivo Periferia desde su creación. Paralelamente a su producción personal, trabaja en colaboración con su compañero Daniel Sarobe desde el año 2006. Ha sido seleccionada en numerosos salones y premios, entre ellos: Mención Salón Nacional de Artes Visuales de Junín (2022), seleccionada Bienal de Dibujo de San Juan (2021), seleccionada Salón Nacional de Artes Visuales, Dibujo (2016). Ha realizado varias muestras individuales: _LindeLínea_ en la sala del Colectivo Periferia, C.A.B.A (2018), _Literatierra_ en Estación de Arte, Junín (2017), Cenital en MuBal, Lincoln (2017). Junto con Daniel Sarobe realizaron dos muestras conjuntas: _Bosquizarse_, en galería HOTEL DADA (2024) y _Entorpeciendo el tránsito_, MACA, Junín (2019). Participó como invitada en numerosos proyectos, convocatorias y Bienales, entre ellas: Bienal Nómade (2026), XVII Bienal de Cuenca, Ecuador (2025),  Bienal Saco 2.0 Antofagasta, Chile (2025), 1° Bienal Posverso en Junín (2024), Proyecto La luz buena (2023 y 2021), Proyecto Totoral (2022), _Otros libros_, exposición de libros de artista en Galería de Arte Hotel Dadá (2021), UNE RÍO Proyecto Conjunto México/Argentina (2016) e INTERFERENCIAS Encuentro Internacional de Arte Acción, Junín (2005).


detalle_2024: |
  (Rosario, 1963) Vive y trabaja en Junín, provincia de Buenos Aires. Artista Visual y docente. Profesora Nacional de Pintura (Escuela Nacional de Bellas Artes Prilidiano Pueyrredón, hoy UNA) y Profesora Superior con Especialización en Dibujo (Escuela de Arte de Junín). Su obra se centra en el dibujo; también realiza objetos e instalaciones, integrando en su producción el textil, el video, el libro de artista, las acciones performáticas y la poesía visual. Ha realizado varias muestras individuales y participado en numerosas muestras colectivas y salones, entre ellos: Mención Salón Nacional de Artes Visuales de Junín (2022), seleccionada Bienal de Dibujo de San Juan (2021), seleccionada Salón Nacional de Artes Visuales, Dibujo (2016). Ha realizado varias muestras individuales: _LindeLínea_ en la sala del Colectivo Periferia, C.A.B.A (2018), _Literatierra_ en Estación de Arte, Junín (2017), Cenital en MuBal, Lincoln (2017). Junto con su compañero Daniel Sarobe: _Entorpeciendo el tránsito_, MACA, Junín (2019), y _Bosquizarse_, en galería HOTEL DADA (2024). Es integrante del Colectivo Periferia desde su creación. Ha desarrollado una vasta tarea docente, en diferentes funciones y niveles educativos, tanto en el ámbito académico como en el informal, publicación de artículos y reseñas en medios locales y regionales, charlas, conferencias y columnas radiales dedicadas a las artes visuales. Participó en INTERFERENCIAS Encuentro Internacional de Arte Acción, Junín (2005). En 2016 fue invitada a ser parte de UNE RÍO Proyecto Conjunto México/Argentina, diálogo performático intercultural entre las comunidades artísticas de ambas latitudes. En 2021 participó de _Otros libros_, exposición de libros de artista en Galería de Arte Hotel Dadá. Junto a Daniel Sarobe formaron parte del Proyecto La luz buena con las performances _La lluvia y los días_ (2021) y _La sombra del follaje_ (2023).
