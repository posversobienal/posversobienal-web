detalle: |
  En un acto multitudinario en la Fundación Casa Pronto, se presentó la segunda edición de POSVERSO, la Bienal Internacional de Poesía Experimental de Argentina.

contenido: |
  Con un fuerte acompañamiento institucional y de la comunidad artística, el pasado 11 de abril se realizó el lanzamiento oficial de POSVERSO BIENAL 2026. Con la presencia de los directores, Silvio De Gracia y Ana Montenegro, y de miembros del equipo de la BIENAL, se abordaron los distintos ejes y el núcleo temático de la nueva edición, al tiempo que se brindaron detalles de los artistas participantes, sedes y novedades del sitio web.

  Silvio De Gracia, director general de la Bienal, abrió la jornada definiendo a POSVERSO como una plataforma descentralizada y democrática que se proyecta desde la pampa argentina hacia el mundo. Bajo el eje temático "Del encantamiento y el horror", De Gracia explicó que esta edición busca recuperar la relación de la humanidad con saberes ancestrales y precapitalistas. "Reivindicamos la poesía y el arte como dispositivos críticos de la vida, herramientas para cuestionar la realidad y desamarrar a la humanidad de sus carencias espirituales", señaló.

  Por su parte, la directora artística Ana Montenegro detalló que la Bienal contará con 54 artistas provenientes de 11 países, incluyendo representantes de Latinoamérica, América del Norte, África y Europa. Destacan figuras de la talla de Santiago Sierra (España), Mounir Fatmi (Marruecos) y Marilá Dardot (Brasil), junto a una selección federal de artistas argentinos. Además, Montenegro subrayó que uno de los objetivos centrales es dar visibilidad al ecosistema cultural local, incorporando a artistas juninenses.

  Por su parte, Carlos Macheratti -encargado de Desarrollo web, diseño gráfico y editorial- presentó el sitio web oficial de la Bienal, diseñado como una herramienta de navegación clara para que el público pueda acceder a la memoria histórica, las biografías de los artistas y las novedades en tiempo real.

  En sintonía con la accesibilidad, Luciano Pozo, director artístico de la Fundación Casa Pronto y mediador educativo de la Bienal, resaltó el compromiso de acercar las propuestas de la BIENAL a los estudiantes y al público en general.

  Finalmente, el periodista y encargado de prensa, Roberto Torres, destacó la trascendencia de POSVERSO en el mapa del arte contemporáneo. "Junín ya integra las bases de datos más grandes del mundo, como Artfacts, Universes in Universes y VADB. Lo que sucede aquí tiene hoy el mismo 'estatus formal' que la Bienal de Venecia o la de San Pablo", afirmó, enfatizando la importancia de democratizar la vanguardia y producir pensamiento crítico de exportación desde el interior bonaerense.
