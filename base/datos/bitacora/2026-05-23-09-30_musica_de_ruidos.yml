contenido: |
  El pasado 9 de mayo, el Laboratorio de Exploración Sonora [LES] presentó MÚSICA DE RUIDOS en Fundación Casa Pronto, sede asociada de POSVERSO BIENAL.

  El Laboratorio de Exploración Sonora (LES) surgió en la galería HOTEL DADA en 2025, y está conformado por Silvio De Gracia, Ana Montenegro y Carlos Macheratti. Planteado como un espacio abierto y horizontal, destinado a impulsar y difundir experimentaciones poético-sonoras, en las que se valora la potencialidad del sonido como un canal privilegiado de expresión, el LES se dinamiza a partir de una serie de prácticas compartidas: investigación, circulación e intercambio de información, visionado de registros audiovisuales, ejercicios de escucha, instancias de exploración y producción individual y/o colaborativa.

  En MÚSICA DE RUIDOS, el colectivo abordó lo sonoro como un campo expandido, en el que las prácticas exploratorias se inscriben fuertemente en el dominio de lo intermedial, trascendiendo el sonido en sí mismo para abrirse a registros conceptuales y perceptuales inesperados. El setlist de MÚSICA DE RUIDOS integró música bytebeat, art noise y performance sonora.

  Este evento pre-bienal se configura como una señal de lo que viene en la edición 2026 de POSVERSO, profundizando la investigación y la presentación de propuestas sonoras que invitan a adentrarse en zonas de inmersión y escucha en un mundo en conflicto.

  POSVERSO BIENAL continua así su apuesta por lo sonoro, iniciada en su primera edición de 2024, con la exposición CÁPSULA SONORA, presentada en HOTEL DADA Centro de poéticas expandidas, y que se refuerza ahora, en su segunda edición, con un eje sonoro específico, que contará con destacados artistas nacionales e internacionales, además de la inclusión de un Festival de RADIOARTE con participantes de todo el mundo.
