detalle: |
  Artistas de POSVERSO BIENAL participan en la exposición monográfica | **DOC(K)S POESIES UNDERGROUND Since 1976**

contenido: |
  POSVERSO expande y consolida su red con un nuevo trabajo en colaboración con la prestigiosa revista de poesía experimental francesa DOC(K)S. En el marco de la muestra monográfica que el CIP de Marsella le dedica, POSVERSO presenta video-acciones poéticas de Ana Montenegro (Brasil/Argentina), Maurizio Mancioli (Suiza/Brasil), Colectivo La Porfía (Argentina) y Silvio De Gracia (Argentina).

  <br>

  **DOC(K)S**
  <br>**POESIES UNDERGROUND**
  <br>**Since 1976**
  <br>**CIP centre international de poésie**
  <br>Centre de la Vieille Charité, Marseille, Francia
  <br>Del 28 de marzo al 13 de junio 2026.

  Exhibición dedicada a la histórica revista fundada por Julien Blaine (Marsella) en 1976, dirigida de 1990 a 2022 por Philippe Castellin y Jean Torregrosa (Akenaton, Ajaccio) ,y desde 2022 por François Massut (Poesie is not dead, Paris-Sète-Charleville) et Xavier Dandoy de Casabianca (éditions éoliennes, Bastia).

  Producida por *Cipm en colaboración com Poésie is not dead* y com *Imec* (*Institut Mémoires de I’edition contemporaine*).
