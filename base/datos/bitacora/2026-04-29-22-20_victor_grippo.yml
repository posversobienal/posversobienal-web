detalle: |
  La muestra central "Del encantamiento y el horror", que se desplegará en HOTEL DADA centro de poéticas expandidas, exhibirá la obra “Energía” del maestro conceptualista nacido en Junín.


contenido: |
  La figura de Víctor Grippo, pionero del arte conceptual y de sistemas en Argentina, tendrá una presencia central y viva en la segunda edición de Posverso, la Bienal Internacional de Poesía Experimental de Argentina. En un gesto de reparación histórica y cultural con su ciudad natal, la obra del maestro juninense regresará al escenario local para dialogar con las poéticas más avanzadas del arte contemporáneo global.

  Gracias al préstamo de Nidia Olmos de Grippo y Paulina Grippo, la emblemática obra “Energía” será exhibida en HOTEL DADA, la sede principal y centro impulsor de la BIENAL.

  <br>
  **Grippo como fuerza viva**

  La Bienal busca reforzar a Junín como un punto estratégico del arte global, devolviéndole al artista su lugar de privilegio en la tierra que inspiró su particular amalgama de química, alquimia y oficio.

  A través de la gestión de los directores de la BIENAL,  Silvio De Gracia y Ana Montenegro, y en el marco de *POSVERSO* 2026, la figura de Grippo se instala como una fuerza viva que atrae a artistas de todo el mundo.

  <br>
  La obra de Víctor Grippo fue actualizando sus sentidos conforme los procesos de la historia fueron agudizando la relación conflictiva del hombre con la naturaleza. En un contexto actual donde prima el caos social y los desastres ambientales, su obra resulta de vital importancia para pensar un nuevo destino del hombre más comprometido con sus procesos naturales y con el desarrollo de una conciencia más amplia.
