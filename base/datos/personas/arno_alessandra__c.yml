detalle: |

  Artista multimedia, curadora e investigadora nacida en Milán, Italia, trabaja en la intersección del videoarte, la estética de los medios digitales y la inteligencia artificial. Su práctica investiga las brechas tecnológicas, la autorrepresentación de los medios y la estética computacional desde perspectivas críticas. Su enfoque es feminista y decolonial. Su obra se ha exhibido internacionalmente y se ha presentado en museos, festivales e instituciones. Ha comisariado numerosos programas de videoarte y exposiciones internacionales. Es directora de Visualcontainer, plataforma italiana de videoarte, e imparte clases de videoarte en academias italianas.

  ---

  [![Visual Container](/rec/extras/logo-visual_container.png){.img-fluid}](https://www.visualcontainer.tv/){target=_blank}

  **Visualcontainer** es una plataforma italiana dedicada al videoarte y la imagen en movimiento experimental, fundada y dirigida por Alessandra Arnò. Activa internacionalmente desde 2008, funciona como plataforma curatorial, centro de producción y red de distribución, apoyando a artistas emergentes y consagrados.

  Su plataforma en línea, **VisualcontainerTV**, lanzada en 2009, es uno de los primeros canales de streaming dedicados exclusivamente al videoarte, con una programación selecta a nivel mundial. A través de exposiciones, festivales, proyectos de investigación y su espacio físico, Visualcontainer.[Box] en Milán, Visualcontainer promueve el debate crítico sobre los medios digitales y la cultura audiovisual contemporánea.
