detalle: |
  Doc(k)s es la revista internacional de poesía viva más antigua y la última que aún existe. Combina diferentes formas de poesía experimental: concreta, visual, sonora, de acción/performance y digital. Es un laboratorio experimental de lenguajes poéticos.

  Doc(k)s se alinea con las vanguardias del siglo XX (futurismo, dadaísmo, surrealismo, situacionismo, letrismo, Fluxus, etc.).

  Creada en Marsella por el poeta Julien Blaine en 1976, tiene su sede en Córcega desde hace más de 35 años. En Ajaccio, el grupo de intermedia Akenaton la retomó en 1990 y, desde 2022, en Bastia, por Editions Eoliennes, en colaboración con el colectivo parisino Poésie is not dead.

  Hasta la fecha, se han publicado/producido 50 volúmenes con 17 CD/DVD/tarjetas USB, que reúnen a más de 3000 poetas internacionales y superan las 23000 páginas impresas.

  Doc(k)s se define como un rizoma dentro de una red de poetas de los cinco continentes que continúan explorando la experimentación poética con el objetivo de liberar la poesía de cualquier gueto, así como de alinearla con el mundo contemporáneo y los diferentes medios que la caracterizan y que practican (escritura/gráficos/imágenes/vídeos/voces/sonidos/cuerpos/electrónica/digital/web).
