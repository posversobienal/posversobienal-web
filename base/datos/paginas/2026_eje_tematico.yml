contenido: |
  El tema de la segunda edición de POSVERSO, _Del encantamiento y el horror_, busca rescatar, a través del arte y las poéticas experimentales, la relación perdida entre la humanidad y las formas de conocimiento precientíficas y precapitalistas. En la etapa actual del antropoceno, signada por la distopía y la extenuación del sistema capitalista, volverse hacia múltiples encarnaciones del arte y la poesía constituye un movimiento táctico, cuyo sentido se cifra en una posibilidad concreta de explorar modos de disidencia.

  En tiempos arcaicos, previos a la simplificación de la realidad por vía de la racionalización, la poesía encarnaba una palabra de poder, destinada a traducir la magia y el asombro del mundo. En esta poesía del encantamiento y la revelación, sostenida como una suerte de acto de fe, confluían tendencias irracionales, resonancias espiritualistas y fuerzas misteriosas. La poesía encauzaba, a contrapelo de su propia desmesura y dispersión, prácticas de exploración de lo invisible y lo sobrenatural, intentos de mediación con lo desconocido y lo temible, impulsos de la imaginación en búsqueda de otros universos posibles.

  En nuestro mundo actual, los artistas y poetas contemporáneos son quizá los únicos que mantienen esa potencia de origen de la poesía, siendo actualizadores y catalizadores de las energías antiguas de la palabra de poder, lo que los convierte en los nuevos brujos y encantadores de un mundo desprovisto de misterios y secretos. Contra la racionalización y la lógica del productivismo, POSVERSO reivindica la poesía y el arte como dispositivos críticos de la vida, herramientas apuntadas a cuestionar la realidad y desamarrar la humanidad de sus carencias espirituales.

  La evolución del mundo tendrá que ser espiritual. De no ser así, las ruinas se repetirán una y otra vez, y se alzarán sin cesar hasta cubrir nuestros horizontes. Un mundo exhausto, aniquilado por las imposiciones del imperialismo obsoleto, por los racionalismos empobrecedores, por los arrebatos tecnofílicos que niegan la carne, no puede salvarse por la fuga ni por los paraísos artificiales erigidos por un arte alienado y escapista.

  Se trata de recuperar saberes ancestrales, revitalizar cosmogonías no hegemónicas, adelantar el curso de la vida hacia la integración de todos los seres que habitan el planeta. Practicar la poesía y el arte como formas de abrir brechas en la realidad, volver a echar luz sobre los conocimientos proscriptos, confrontar nuevos miedos e insistir en indisciplinar los cuerpos y los pensamientos. Volver atrás sin nostalgia de aquello que nunca se perdió; aquello que, abrigado en la opacidad y la sombra, siempre ha permanecido latente. Las antiguas magias retornan.

  El futuro está atrás. Pero este volver atrás no es un delirio que se yergue sobre el vacío de la nostalgia. Volver atrás es un desplazamiento hacia lo real, lo ancestral, lo humano, lo incontaminado. Hay que tomar impulso desde ahí, desde la tierra bestial y pura de la magia, desde el seno sagrado del mundo precapitalista. Es hora de elevar los viejos rezos y los conjuros nunca olvidados para celebrar el fin de un mundo y el alumbramiento de otro.

  El horror del mundo no se desvanece en un silencio cómplice y las verdades que deben ser dichas no se embozan en una temerosa voz baja. POSVERSO BIENAL apuesta por un arte insumiso y despiadado, un arte hecho de ruidos crudos y de esplendorosas disonancias.

  No es tiempo de miradas esquivas ni de proyectos de salvación personal. Al arte le toca asumir riesgos, plantarse ante la realidad, enfrentar el horror sin miedo. La poesía es un arma contra la muerte. Un poema, un sonido, una obra visual que no nos inquiete es una traición.

  Si el arte se pierde en la búsqueda de islas artificiales de belleza e indiferencia, la muerte avanza. POSVERSO BIENAL cree en la inevitabilidad del conflicto como clave de toda práctica artística. Al mundo se lo cambia empujando los cambios.

  POSVERSO, _Del encantamiento y el horror_, apuesta por artistas y poetas que trabajan en la búsqueda de nuevas magias que alumbren la oscuridad, que trasunten un intento supremo de rebelión, y que reabran portales que nunca debieron haber sido cerrados.

  Silvio De Gracia, 6 de abril de 2025
